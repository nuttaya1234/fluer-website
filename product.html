<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Products – Fleur</title>
  <meta name="description" content="Shop all Fleur collections — tops, swimwear, dresses and more.">
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montagu+Slab:opsz,wght@16..144,100..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
  <!-- Left: Hamburger -->
  <button class="hamburger" id="hamburgerBtn" aria-label="Open menu" onclick="toggleDrawer()">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <!-- Center: Logo -->
  <a href="/homepage" class="logo-link navbar-logo">
    <img src="image/icon/logo_header.svg" alt="FLEUR logo" class="logo" width="180" height="40">
  </a>

  <!-- Right: Icons -->
  <div class="nav-icons">
    <a href="/search" class="nav-icon-btn" aria-label="Search">
      <img src="image/icon/search.svg" alt="Search" class="nav-icon-img">
    </a>
    <a href="/login" class="nav-icon-btn" aria-label="Login">
      <img src="image/icon/login.svg" alt="Login" class="nav-icon-img">
    </a>
    <a href="#" class="nav-icon-btn" aria-label="Shopping bag">
      <img src="image/icon/bag.svg" alt="Bag" class="nav-icon-img">
    </a>
  </div>
</header>

<!-- Slide-in Drawer -->
<div class="drawer-overlay" id="drawerOverlay" onclick="toggleDrawer()"></div>
<nav class="drawer" id="drawerNav">
  <button class="drawer-close" onclick="toggleDrawer()" aria-label="Close menu">✕</button>
  <a href="/homepage">Home</a>
  <a href="/product">Products</a>
  <a href="/team">About</a>
  <a href="/login">Login</a>
</nav>

<script>
  function toggleDrawer() {
    document.getElementById('drawerNav').classList.toggle('open');
    document.getElementById('drawerOverlay').classList.toggle('open');
  }
</script>

<!-- PRODUCTS PAGE -->
<section class="products">
  <h2>Our Products</h2>
  <div class="grid" id="productGrid">
    <p style="padding:24px;color:#999;font-family:'Montagu Slab',serif">Loading products…</p>
  </div>
</section>

<script src="api.js"></script>
<script>
  async function loadProducts() {
    const grid = document.getElementById('productGrid');
    try {
      const products = await FleurAPI.getProducts();
      if (!products.length) { grid.innerHTML = '<p style="padding:24px">No products found.</p>'; return; }
      grid.innerHTML = products.map(p => `
        <a href="/product-detail?id=${p.db_id}" class="card">
          <img src="${p.img}" alt="${p.name}">
          <div class="card-text">
            <h3>${p.name}</h3>
            <p>${p.price} THB</p>
          </div>
        </a>
      `).join('');
    } catch (err) {
      grid.innerHTML = '<p style="padding:24px;color:#AC040D">⚠️ Could not load products. Make sure the server is running.</p>';
    }
  }
  loadProducts();
</script>

<!-- FOOTER -->
<footer class="site-footer">
  <div class="footer-inner">

    <div class="footer-col footer-brand">
      <img src="image/icon/logo_footer.svg" alt="Fleur" class="footer-logo">
      <p class="footer-copy">© 2026 Fleur</p>
    </div>

    <div class="footer-col">
      <a href="#">All products</a>
      <a href="#">Tops</a>
      <a href="#">Bottoms</a>
      <a href="#">Swimsuits</a>
    </div>

    <div class="footer-col">
      <a href="#">Size Guide</a>
      <a href="/team">Our Team</a>
      <a href="/login">Admin Login</a>
    </div>

  </div>
</footer>

</body>
</html>
