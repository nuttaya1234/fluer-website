<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search – Fleur</title>
  <meta name="description" content="Search for your favourite Fleur pieces.">
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montagu+Slab:opsz,wght@16..144,100..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
  <button class="hamburger" id="hamburgerBtn" aria-label="Open menu" onclick="toggleDrawer()">
    <span></span><span></span><span></span>
  </button>
  <a href="/homepage" class="logo-link navbar-logo">
    <img src="image/icon/logo_header.svg" alt="FLEUR logo" class="logo" width="180" height="40">
  </a>
  <div class="nav-icons">
    <a href="/search" class="nav-icon-btn" aria-label="Search">
      <img src="image/icon/search.svg" alt="Search" class="nav-icon-img">
    </a>
    <a href="/login" class="nav-icon-btn" aria-label="Login">
      <img src="image/icon/login.svg" alt="Login" class="nav-icon-img">
    </a>
    <a href="#" class="nav-icon-btn" aria-label="Shopping bag">
      <img src="image/icon/bag.svg" alt="Bag" class="nav-icon-img">
    </a>
  </div>
</header>

<!-- Slide-in Drawer -->
<div class="drawer-overlay" id="drawerOverlay" onclick="toggleDrawer()"></div>
<nav class="drawer" id="drawerNav">
  <button class="drawer-close" onclick="toggleDrawer()" aria-label="Close menu">✕</button>
  <a href="/homepage">Home</a>
  <a href="/product">Products</a>
  <a href="/team">About</a>
  <a href="/login">Login</a>
</nav>

<script>
  function toggleDrawer() {
    document.getElementById('drawerNav').classList.toggle('open');
    document.getElementById('drawerOverlay').classList.toggle('open');
  }
</script>

<!-- SEARCH PAGE -->
<main class="search-page">

  <!-- Search Bar -->
  <div class="search-bar-wrap">
    <div class="search-bar">

      <!-- Text input -->
      <div class="search-input-group">
        <svg class="search-input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="searchInput" class="search-input" placeholder="Search name…">
      </div>

      <div class="search-divider"></div>

      <!-- Category dropdown -->
      <div class="custom-dropdown" id="categoryDropdown">
        <button class="custom-dropdown-btn" onclick="toggleDropdown('categoryDropdown')">
          <span class="custom-dropdown-label" id="categoryLabel">Category</span>
          <img src="image/icon/dropdown.svg" alt="▾" class="custom-dropdown-icon" id="categoryArrow">
        </button>
        <ul class="custom-dropdown-list" id="categoryList">
          <li onclick="selectOption('categoryDropdown','categoryLabel','categorySelect','','Category')">All</li>
          <li onclick="selectOption('categoryDropdown','categoryLabel','categorySelect','tops','Tops')">Tops</li>
          <li onclick="selectOption('categoryDropdown','categoryLabel','categorySelect','bottoms','Bottoms')">Bottoms</li>
          <li onclick="selectOption('categoryDropdown','categoryLabel','categorySelect','swimwear','Swimwear')">Swimwear</li>
          <li onclick="selectOption('categoryDropdown','categoryLabel','categorySelect','dresses','Dress')">Dress</li>
          <li onclick="selectOption('categoryDropdown','categoryLabel','categorySelect','sweaters','Sweaters')">Sweaters</li>
        </ul>
      </div>
      <input type="hidden" id="categorySelect" value="">

      <div class="search-divider"></div>

      <!-- Size dropdown -->
      <div class="custom-dropdown custom-dropdown--short" id="sizeDropdown">
        <button class="custom-dropdown-btn" onclick="toggleDropdown('sizeDropdown')">
          <span class="custom-dropdown-label" id="sizeLabel">Size</span>
          <img src="image/icon/dropdown.svg" alt="▾" class="custom-dropdown-icon" id="sizeArrow">
        </button>
        <ul class="custom-dropdown-list" id="sizeList">
          <li onclick="selectOption('sizeDropdown','sizeLabel','sizeSelect','','Size')">All</li>
          <li onclick="selectOption('sizeDropdown','sizeLabel','sizeSelect','xs','XS')">XS</li>
          <li onclick="selectOption('sizeDropdown','sizeLabel','sizeSelect','s','S')">S</li>
          <li onclick="selectOption('sizeDropdown','sizeLabel','sizeSelect','m','M')">M</li>
          <li onclick="selectOption('sizeDropdown','sizeLabel','sizeSelect','l','L')">L</li>
          <li onclick="selectOption('sizeDropdown','sizeLabel','sizeSelect','xl','XL')">XL</li>
        </ul>
      </div>
      <input type="hidden" id="sizeSelect" value="">

      <div class="search-divider"></div>

      <!-- Color input -->
      <input type="text" id="colorInput" class="search-input search-input--color" placeholder="Color">

      <div class="search-divider"></div>

      <!-- Search button -->
      <button class="search-btn" onclick="doSearch()">Search</button>

      <!-- Clear -->
      <button class="search-clear" onclick="clearSearch()">Clear</button>

    </div>
  </div>

  <!-- Results -->
  <div class="search-results" id="results" style="display:none">
    <p class="search-result-label" id="resultLabel"></p>
    <div class="grid" id="resultsGrid"></div>
  </div>

</main>

<!-- FOOTER -->
<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-col footer-brand">
      <img src="image/icon/logo_footer.svg" alt="Fleur" class="footer-logo">
      <p class="footer-copy">© 2026 Fleur</p>
    </div>
    <div class="footer-col">
      <a href="#">All products</a>
      <a href="#">Tops</a>
      <a href="#">Bottoms</a>
      <a href="#">Swimsuits</a>
    </div>
    <div class="footer-col">
      <a href="#">Size Guide</a>
      <a href="/team">Our Team</a>
      <a href="/login">Admin Login</a>
    </div>
  </div>
</footer>

<script src="api.js"></script>
<script>
  let products = [];

  // ── Render product cards ────────────────────────────────
  function renderCards(list) {
    const resultsDiv = document.getElementById('results');
    const grid       = document.getElementById('resultsGrid');
    const label      = document.getElementById('resultLabel');

    resultsDiv.style.display = 'block';

    if (list.length === 0) {
      label.textContent = 'No products found.';
      grid.innerHTML = '';
      return;
    }

    label.textContent = `${list.length} product${list.length !== 1 ? 's' : ''} found`;
    grid.innerHTML = list.map(p => `
      <div class="card" onclick="window.location.href='/product-detail?id=${p.db_id}'" style="cursor:pointer">
        <img src="${p.img}" alt="${p.name}">
        <div class="card-text">
          <h3>${p.name}</h3>
          <p>${p.price} THB</p>
        </div>
      </div>
    `).join('');
  }

  // ── Dropdown helpers ────────────────────────────────────
  function toggleDropdown(id) {
    const dd = document.getElementById(id);
    const isOpen = dd.classList.contains('open');
    document.querySelectorAll('.custom-dropdown').forEach(d => d.classList.remove('open'));
    if (!isOpen) dd.classList.add('open');
  }

  function selectOption(dropdownId, labelId, inputId, value, display) {
    document.getElementById(labelId).textContent = display;
    document.getElementById(inputId).value = value;
    document.getElementById(dropdownId).classList.remove('open');
    doSearch(); // auto-filter when category/size selected
  }

  document.addEventListener('click', function(e) {
    if (!e.target.closest('.custom-dropdown')) {
      document.querySelectorAll('.custom-dropdown').forEach(d => d.classList.remove('open'));
    }
  });

  // ── Search / filter ─────────────────────────────────────
  function doSearch() {
    const q     = (document.getElementById('searchInput').value || '').trim().toLowerCase();
    const cat   = (document.getElementById('categorySelect').value || '').toLowerCase();
    const size  = (document.getElementById('sizeSelect').value || '').toLowerCase();
    const color = (document.getElementById('colorInput').value || '').trim().toLowerCase();

    const filtered = products.filter(p =>
      (!q     || (p.name || '').toLowerCase().includes(q)) &&
      (!cat   || (p.category || '').toLowerCase().includes(cat)) &&
      (!size  || (p.size || '').toLowerCase() === size) &&
      (!color || (p.color || '').toLowerCase().includes(color))
    );

    renderCards(filtered);
  }

  function clearSearch() {
    document.getElementById('searchInput').value = '';
    document.getElementById('categorySelect').value = '';
    document.getElementById('categoryLabel').textContent = 'Category';
    document.getElementById('sizeSelect').value = '';
    document.getElementById('sizeLabel').textContent = 'Size';
    document.getElementById('colorInput').value = '';
    renderCards(products); // show all
  }

  // ── Load products on page load and show all ─────────────
  async function initSearch() {
    const btn = document.querySelector('.search-btn');
    if (btn) { btn.textContent = 'Loading…'; btn.disabled = true; }
    try {
      products = await FleurAPI.getProducts();
      renderCards(products); // show all products immediately
    } catch (e) {
      document.getElementById('resultLabel').textContent = '⚠️ Could not connect to server.';
      document.getElementById('results').style.display = 'block';
    } finally {
      if (btn) { btn.textContent = 'Search'; btn.disabled = false; }
    }
  }

  // Allow Enter key to search
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });

  initSearch();
</script>



</body>
</html>
